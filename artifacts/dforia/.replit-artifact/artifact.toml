kind = "web"
previewPath = "/"
title = "D'Foria Kitchen"
version = "1.0.0"
id = "artifacts/dforia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25877

[services.development]
run = "pnpm --filter @workspace/dforia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dforia", "run", "build" ]
publicDir = "artifacts/dforia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25877"
BASE_PATH = "/"
